<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- IMPORTAR CSS -->
<link rel="stylesheet" href="styles.css">


</head>

<body>

<div class="container">

<!-- ==========================================================
     PANTALLA DE INICIO
     Este bloque sustituye COMPLETAMENTE al actual <div id="inicio">
     ========================================================== -->

<div id="inicio" class="card">

    <!-- ======================================================
         TÍTULO
         ====================================================== -->

    <h2 class="card-title">
        Configuración de la partida
    </h2>

    <p style="margin-bottom:25px;color:#aaa;">
        Selecciona el modo de juego y añade entre 1 y 4 jugadores.
    </p>


    <!-- ======================================================
         SELECCIÓN DE MODO
         ====================================================== -->

    <div class="modo-selector">

        <button
            id="btnCricket"
            class="btn primary"
            onclick="seleccionarModo('cricket')">

            🏏 Cricket

        </button>

        <button
            id="btn501"
            class="btn secondary"
            onclick="seleccionarModo('501')">

            🎯 501

        </button>

    </div>


    <!-- ======================================================
         LISTA DE JUGADORES
         ====================================================== -->

    <div class="card" style="margin-top:25px;">

        <h3 style="margin-bottom:15px;">
            Jugadores
        </h3>

        <div id="jugadores">

            <!--
                Los jugadores serán añadidos dinámicamente
                por addJugador()
            -->

        </div>

        <button
            class="btn secondary"
            style="margin-top:15px;width:100%;"
            onclick="addJugador()">

            ➕ Añadir jugador

        </button>

    </div>


    <!-- ======================================================
         BOTÓN COMENZAR
         ====================================================== -->

    <button
        class="btn primary"
        style="
            width:100%;
            margin-top:25px;
            font-size:20px;
            padding:18px;
        "
        onclick="iniciar()">

        ▶ COMENZAR PARTIDA

    </button>

</div>

<!-- ==========================================================
     FUNCIÓN PARA CAMBIAR EL MODO DE JUEGO
     Sustituye por completo a:
         onclick="modo='501'"
         onclick="modo='cricket'"
     ========================================================== -->

<script>

function seleccionarModo(nuevoModo){

    modo = nuevoModo;

    const cricket = document.getElementById("btnCricket");
    const juego501 = document.getElementById("btn501");

    cricket.className = "btn secondary";
    juego501.className = "btn secondary";

    if(nuevoModo==="cricket"){

        cricket.className="btn primary";

    }else{

        juego501.className="btn primary";

    }

}

</script>

<div id="juego" style="display:none;">

<div class="card">
<h3 id="turno"></h3>
<div id="score"></div>
<p>Dardos: <span id="dardos">0</span>/3</p>
<p id="estadoTurno"></p>
</div>

<div class="card selector">
<button onclick="setMulti(1)" id="b1" class="btn primary">N</button>
<button onclick="setMulti(2)" id="b2" class="btn secondary">D</button>
<button onclick="setMulti(3)" id="b3" class="btn secondary">T</button>
</div>

<div class="card">
<div id="botones" class="grid"></div>
</div>

</div>

</div>

<!-- IMPORTAR JS -->
<script type="text/javascript" src="script.js"></script>

</body>
</html>
